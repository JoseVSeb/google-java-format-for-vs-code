name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Lint & format check via Biome
  # -----------------------------------------------------------------------
  lint:
    name: Biome check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npm run check

  # -----------------------------------------------------------------------
  # Build
  # -----------------------------------------------------------------------
  build:
    name: Build (production)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run package

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # -----------------------------------------------------------------------
  # e2e tests (against the production build)
  # -----------------------------------------------------------------------
  test:
    name: e2e tests (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Java (needed for jar-file mode tests)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Compile test sources
        run: npm run compile-tests

      # Linux requires a virtual display for the Electron window
      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Run e2e tests with coverage (Linux – Xvfb)
        if: runner.os == 'Linux'
        # Rebuild with 'compile' (devtool: nosources-source-map) so the bundle
        # contains //# sourceMappingURL= — without it c8 cannot resolve sources
        # and lcov ends up referencing dist/extension.js instead of src/**/*.ts,
        # which causes Codecov to report "source code unavailability".
        run: npm run compile && xvfb-run -a npx vscode-test --coverage --coverage-reporter lcovonly

      - name: Run e2e tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npx vscode-test

      - name: Upload coverage report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  # -----------------------------------------------------------------------
  # Upload coverage to Codecov (only from the Linux run)
  # -----------------------------------------------------------------------
  coverage:
    name: Upload coverage to Codecov
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

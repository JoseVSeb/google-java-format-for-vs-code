name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Lint & format check via Biome
  # -----------------------------------------------------------------------
  lint:
    name: Biome check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npm run check

  # -----------------------------------------------------------------------
  # Build dev bundle once (with source maps for coverage)
  # -----------------------------------------------------------------------
  build:
    name: Build (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dev build (with source maps)
        run: npm run compile

      - name: Upload dev bundle
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # -----------------------------------------------------------------------
  # e2e tests (all platforms share the same dev bundle)
  # -----------------------------------------------------------------------
  test:
    name: e2e tests (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Java (needed for jar-file mode tests)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # GJF ≥ 1.22.0 requires Java 21 (uses Java 21 compiler APIs for
          # pattern matching; running with Java 17 causes NoClassDefFoundError
          # on JCTree$JCAnyPattern).
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Download dev bundle
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Download the GJF all-deps jar using the authenticated gh CLI so that
      # the extension never needs to call the GitHub API during test activation
      # (avoids rate-limiting / macOS Electron fetch failures).
      - name: Download google-java-format jar (latest)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release download \
            --repo google/google-java-format \
            --pattern "*-all-deps.jar" \
            --dir "${RUNNER_TEMP}"
          echo "GJF_JAR=$(find "${RUNNER_TEMP}" -name "*-all-deps.jar" | head -1)" >> "${GITHUB_ENV}"

      # Download a pinned older release to exercise the "specific version" code path.
      - name: Download google-java-format jar (specific version v1.25.2)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release download v1.25.2 \
            --repo google/google-java-format \
            --pattern "*-all-deps.jar" \
            --dir "${RUNNER_TEMP}/gjf-specific" || true
          SPECIFIC=$(find "${RUNNER_TEMP}/gjf-specific" -name "*-all-deps.jar" | head -1)
          [ -n "$SPECIFIC" ] && echo "GJF_JAR_SPECIFIC=$SPECIFIC" >> "$GITHUB_ENV" || true

      # Download the native binary for the current platform to exercise the
      # "native-binary" code path.  The binary name pattern is OS-specific.
      - name: Download google-java-format native binary
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   PATTERN="*-linux-x86-64"           ;;
            macOS)   PATTERN="*-darwin-arm64"            ;;
            # Note: `macos-latest` in GitHub Actions is now ARM64 (Apple
            # Silicon).  If a future runner uses x86-64 there is no macOS
            # x86-64 native binary in GJF releases, so the download will
            # return nothing and GJF_NATIVE will remain unset (tests skip).
            Windows) PATTERN="*-windows-x86-64.exe"      ;;
            *)       exit 0                              ;;
          esac
          gh release download \
            --repo google/google-java-format \
            --pattern "$PATTERN" \
            --dir "${RUNNER_TEMP}/gjf-native" || true
          BIN=$(find "${RUNNER_TEMP}/gjf-native" -type f | head -1)
          [ -n "$BIN" ] && echo "GJF_NATIVE=$BIN" >> "$GITHUB_ENV" || true

      - name: Compile test sources
        run: npm run compile-tests

      # Linux requires a virtual display for the Electron window
      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Run e2e tests with coverage (Linux – Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npx vscode-test --coverage --coverage-reporter lcovonly

      - name: Run e2e tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npx vscode-test

      - name: Upload coverage report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  # -----------------------------------------------------------------------
  # Upload coverage to Codecov (only from the Linux run)
  # -----------------------------------------------------------------------
  coverage:
    name: Upload coverage to Codecov
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
